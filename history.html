<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css"></head>
<body>
    <div class="container">
        <h2>My Orders</h2>
        <div id="list"></div>
        <a href="index.html"><button style="margin-top:20px; background:#666;">Back</button></a>
    </div>

    <script>
        function render() {
            const orders = JSON.parse(localStorage.getItem('cakeOrders')) || [];
            document.getElementById('list').innerHTML = orders.map((o, i) => `
                <div class="order-card">
                    <div>
                        <small>${o.id} | ${o.date}</small>
                        <p><b>${o.flavour}</b> - ${o.status}</p>
                    </div>
                    ${o.status === 'Pending' ? `<button onclick="cancel(${i})" style="width:auto; background:red; padding:5px 10px;">Cancel</button>` : ''}
                </div>
            `).join('');
        }

        function cancel(index) {
            let orders = JSON.parse(localStorage.getItem('cakeOrders'));
            orders[index].status = "Cancelled";
            localStorage.setItem('cakeOrders', JSON.stringify(orders));
            render();
        }
        render();
    </script>
</body>
</html>
