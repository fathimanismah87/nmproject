<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details - Sweet Bliss</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div style="position: sticky; top: 0; background: rgba(255,255,255,0.9); z-index: 10; padding-bottom: 5px;">
            <h2>Customize your cake</h2>
            <p>Tell us about your perfect cake</p>
        </div>

        <form action="order.html" method="GET">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" placeholder="Mobile Number" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Cake Flavour</label>
                    <select name="flavour" id="flavour" required onchange="calculatePrice()">
                        <option value="Chocolate 🍫">Chocolate 🍫</option>
                        <option value="Vanilla 🍦">Vanilla 🍦</option>
                        <option value="Red Velvet ❤️">Red Velvet ❤️</option>
                        <option value="Strawberry 🍓">Strawberry 🍓</option>
                        <option value="Pineapple 🍍">Pineapple 🍍</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Size (kg)</label>
                    <select name="size" id="size" required onchange="calculatePrice()">
                        <option value="0.5">0.5 kg</option>
                        <option value="1" selected>1 kg</option>
                        <option value="2">2 kg</option>
                        <option value="3">3 kg</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Occasion</label>
                    <select name="occasion" required>
                        <option>Birthday 🎉</option>
                        <option>Wedding 💍</option>
                        <option>Anniversary ❤️</option>
                        <option>Other 🎂</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Delivery Date</label>
                    <input type="date" name="date" required>
                </div>
            </div>

            <div class="form-group">
                <label>Message on Cake</label>
                <textarea name="message" placeholder="e.g. Happy Birthday Nisma!" rows="3"></textarea>
            </div>

            <div class="price-display">
                Estimated Total: <span id="priceTag">₹500</span>
            </div>

            <button type="submit">Review & Confirm</button>
        </form>

        <a href="index.html" style="display: block; text-align: center; margin-top: 20px; color: #999; text-decoration: none; font-size: 12px; font-weight: 600;">
            ← CANCEL
        </a>
    </div>

    <script>
        function calculatePrice() {
            const flavour = document.getElementById('flavour').value;
            const size = parseFloat(document.getElementById('size').value);
            
            const flavourRates = {
                "Chocolate 🍫": 500,
                "Vanilla 🍦": 400,
                "Red Velvet ❤️": 600,
                "Strawberry 🍓": 500,
                "Pineapple 🍍": 450
            };
            
            const total = flavourRates[flavour] * size;
            document.getElementById('priceTag').innerText = "₹" + total;
        }

        // Initialize price on load
        window.onload = calculatePrice;
    </script>
</body>
</html>
