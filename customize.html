<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize Your Cake - Sweet Bliss</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container" style="max-width: 650px;"> <h2>Customize Your Cake</h2>
        <p>Fill in the details to create your perfect treat!</p>

        <form action="order.html" method="GET">
            
            <div class="form-row">
                <div class="form-group">
                    <label>FULL NAME *</label>
                    <input type="text" name="name" placeholder="e.g. Nisma" required>
                </div>
                <div class="form-group">
                    <label>PHONE NUMBER *</label>
                    <input type="tel" name="phone" placeholder="10-digit mobile" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>CAKE FLAVOUR *</label>
                    <select name="flavour" id="flavour" required onchange="updatePrice()">
                        <option value="" disabled selected>— Select Flavour —</option>
                        <option value="Chocolate 🍫">🍫 Chocolate</option>
                        <option value="Vanilla 🍦">🍦 Vanilla</option>
                        <option value="Red Velvet ❤️">❤️ Red Velvet</option>
                        <option value="Butterscotch 🍬">🍬 Butterscotch</option>
                        <option value="Strawberry 🍓">🍓 Strawberry</option>
                        <option value="Black Forest 🌲">🌲 Black Forest</option>
                        <option value="Pineapple 🍍">🍍 Pineapple</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>CAKE SIZE *</label>
                    <select name="size" id="size" required onchange="updatePrice()">
                        <option value="" disabled selected>— Select Size —</option>
                        <option value="0.5">0.5 kg</option>
                        <option value="1">1 kg</option>
                        <option value="1.5">1.5 kg</option>
                        <option value="2">2 kg</option>
                        <option value="3">3 kg</option>
                        <option value="4">4 kg</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>OCCASION *</label>
                    <select name="occasion" required>
                        <option value="" disabled selected>— Select Occasion —</option>
                        <option>Birthday 🎉</option>
                        <option>Wedding 💍</option>
                        <option>Anniversary ❤️</option>
                        <option>Baby Shower 👶</option>
                        <option>Graduation 🎓</option>
                        <option>Other 🎂</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>DELIVERY DATE *</label>
                    <input type="date" name="date" required>
                </div>
            </div>

            <div class="form-group">
                <label>MESSAGE ON CAKE</label>
                <textarea name="message" placeholder="e.g. Happy Birthday Nisma! ❤️" rows="3"></textarea>
            </div>

            <div class="price-display">
                Estimated Price: <span id="totalPrice">₹0</span>
            </div>

            <div class="button-group">
                <button type="submit">Next: Review Details</button>
            </div>
        </form>
    </div>

    <script>
        function updatePrice() {
            const flavourRates = {
                "Chocolate 🍫": 500, "Vanilla 🍦": 450, "Red Velvet ❤️": 600,
                "Butterscotch 🍬": 550, "Strawberry 🍓": 500, "Black Forest 🌲": 550, "Pineapple 🍍": 450
            };
            const flavour = document.getElementById('flavour').value;
            const size = parseFloat(document.getElementById('size').value) || 0;

            if (flavour && size) {
                let total = (flavourRates[flavour] * size);
                document.getElementById('totalPrice').innerText = "₹" + total;
            } else {
                document.getElementById('totalPrice').innerText = "—";
            }
        }
    </script>
</body>
</html>
