<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Your Order - Sweet Bliss</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Review Your Order</h2>
        <p>Almost there! Check your details before we start baking.</p>

        <div class="visualizer-card" style="text-align: left; line-height: 1.8;">
            <div style="border-bottom: 1px dashed #ff4d88; margin-bottom: 15px; padding-bottom: 10px;">
                <label>Customer Details</label>
                <p style="text-align: left; margin: 0; color: #333;">
                    <strong>Name:</strong> <span id="res-name"></span><br>
                    <strong>Phone:</strong> <span id="res-phone"></span>
                </p>
            </div>

            <div style="margin-bottom: 15px;">
                <label>Cake Specifications</label>
                <p style="text-align: left; margin: 0; color: #333;">
                    <strong>Flavour:</strong> <span id="res-flavour"></span><br>
                    <strong>Size:</strong> <span id="res-size"></span> kg<br>
                    <strong>Occasion:</strong> <span id="res-occasion"></span><br>
                    <strong>Delivery Date:</strong> <span id="res-date"></span>
                </p>
            </div>

            <div>
                <label>Custom Message</label>
                <p style="text-align: left; margin: 0; color: #ff4d88; font-style: italic;">
                    "<span id="res-message"></span>"
                </p>
            </div>
        </div>

        <div class="price-display">
            Final Amount: <span id="res-total">₹0</span>
        </div>

        <div class="button-group">
            <button onclick="confirmAndSave()">Confirm & Place Order</button>
            <button onclick="history.back()" style="background: #666; margin-top: 12px; box-shadow: none;">
                Edit Selection
            </button>
        </div>
    </div>

    <script>
        // 1. Get Data from URL
        const params = new URLSearchParams(window.location.search);
        
        // 2. Pricing Logic (Match this with customize.html)
        const rates = {
            "Chocolate 🍫": 500,
            "Vanilla 🍦": 400,
            "Red Velvet ❤️": 600,
            "Butterscotch 🍬": 550,
            "Strawberry 🍓": 500,
            "Black Forest 🌲": 550,
            "Pineapple 🍍": 450
        };

        const flavour = params.get('flavour') || "Chocolate 🍫";
        const size = parseFloat(params.get('size')) || 1;
        const totalPrice = rates[flavour] * size;

        // 3. Fill the Page
        document.getElementById('res-name').innerText = params.get('name') || "Guest";
        document.getElementById('res-phone').innerText = params.get('phone') || "N/A";
        document.getElementById('res-flavour').innerText = flavour;
        document.getElementById('res-size').innerText = size;
        document.getElementById('res-occasion').innerText = params.get('occasion') || "Celebration";
        document.getElementById('res-date').innerText = params.get('date') || "Today";
        document.getElementById('res-message').innerText = params.get('message') || "No message";
        document.getElementById('res-total').innerText = "₹" + totalPrice;

        // 4. Save to LocalStorage and Redirect
        function confirmAndSave() {
            // Create Order Object
            const newOrder = {
                id: "SB-" + Math.floor(Math.random() * 9000 + 1000),
                date: new Date().toLocaleDateString(),
                customer: params.get('name'),
                flavour: flavour,
                size: size,
                total: "₹" + totalPrice,
                status: "Pending" // Initial status for History page
            };

            // Get existing orders
            let orderHistory = JSON.parse(localStorage.getItem('cakeOrders')) || [];
            
            // Add new order to top of list
            orderHistory.unshift(newOrder);
            
            // Save back to storage
            localStorage.setItem('cakeOrders', JSON.stringify(orderHistory));

            // Success feedback
            alert("🎉 Success! Your order " + newOrder.id + " has been recorded.");
            window.location.href = "success.html";
        }
    </script>

</body>
</html>
